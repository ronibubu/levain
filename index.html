<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>르방 리프레시 계산기</title>
  <style>
    :root {
      --bg: #fbf6ef;
      --card: #ffffff;
      --text: #2f261f;
      --muted: #7b6d62;
      --accent: #8b5e3c;
      --accent-light: #f2e5d8;
      --border: #eadfD4;
      --shadow: 0 16px 40px rgba(85, 55, 32, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at top, #fffaf4 0%, var(--bg) 48%, #f5eadf 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 460px;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(234, 223, 212, 0.9);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 30px;
      line-height: 1.2;
      margin: 0 0 10px;
      letter-spacing: -0.04em;
    }

    .description {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }

    label {
      display: block;
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 18px 52px 18px 18px;
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      background: #fffdfa;
      outline: none;
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(139, 94, 60, 0.12);
    }

    .unit {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-weight: 800;
      font-size: 18px;
    }

    .results {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 17px;
      background: #fff8f1;
      border: 1px solid var(--border);
      border-radius: 18px;
    }

    .result-row span:first-child {
      color: #5f5146;
      font-weight: 700;
    }

    .result-row strong {
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .total {
      margin-top: 4px;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .total span:first-child {
      color: rgba(255, 255, 255, 0.86);
    }

    .sentence {
      margin: 18px 0 0;
      padding: 17px;
      border-radius: 18px;
      background: #f7efe8;
      color: #4d4037;
      font-size: 15px;
      line-height: 1.7;
    }

    .note {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    .ratio {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .chip {
      border: 1px solid var(--border);
      background: #fffdf9;
      color: #6d5b4e;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 420px) {
      body {
        padding: 16px;
        align-items: flex-start;
      }

      .card {
        padding: 24px 20px;
        border-radius: 24px;
      }

      h1 {
        font-size: 27px;
      }

      input {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="title">
      <div class="eyebrow">🍞 르방 밥주기</div>
      <h1 id="title">르방 리프레시 계산기</h1>
      <p class="description">
        르방 양을 입력하면 통밀, 강력분, 물 양을 자동으로 계산해요.
      </p>

      <label for="levain">르방 양</label>
      <div class="input-wrap">
        <input id="levain" type="number" min="0" step="1" value="50" inputmode="decimal" />
        <span class="unit">g</span>
      </div>

      <div class="results" aria-live="polite">
        <div class="result-row">
          <span>통밀</span>
          <strong><span id="wholeWheat">10</span>g</strong>
        </div>
        <div class="result-row">
          <span>강력분</span>
          <strong><span id="breadFlour">40</span>g</strong>
        </div>
        <div class="result-row">
          <span>물</span>
          <strong><span id="water">40</span>g</strong>
        </div>
        <div class="result-row total">
          <span>최종 르방 총량</span>
          <strong><span id="total">140</span>g</strong>
        </div>
      </div>

      <p class="sentence" id="sentence">
        르방 50g에 통밀 10g, 강력분 40g, 물 40g을 넣어주세요.
      </p>

      <div class="ratio" aria-label="기준 비율">
        <span class="chip">르방 1</span>
        <span class="chip">밀가루 1</span>
        <span class="chip">물 0.8</span>
        <span class="chip">통밀 20%</span>
        <span class="chip">강력분 80%</span>
      </div>

      <p class="note">
        기준 레시피: 르방 50g + 통밀 10g + 강력분 40g + 물 40g
      </p>
    </section>
  </main>

  <script>
    const levainInput = document.getElementById('levain');
    const wholeWheatEl = document.getElementById('wholeWheat');
    const breadFlourEl = document.getElementById('breadFlour');
    const waterEl = document.getElementById('water');
    const totalEl = document.getElementById('total');
    const sentenceEl = document.getElementById('sentence');

    function formatGram(value) {
      const rounded = Math.round(value * 10) / 10;
      return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
    }

    function calculate() {
      const levain = Number(levainInput.value);
      const safeLevain = Number.isFinite(levain) && levain > 0 ? levain : 0;

      const wholeWheat = safeLevain * 0.2;
      const breadFlour = safeLevain * 0.8;
      const water = safeLevain * 0.8;
      const total = safeLevain + wholeWheat + breadFlour + water;

      const levainText = formatGram(safeLevain);
      const wholeWheatText = formatGram(wholeWheat);
      const breadFlourText = formatGram(breadFlour);
      const waterText = formatGram(water);
      const totalText = formatGram(total);

      wholeWheatEl.textContent = wholeWheatText;
      breadFlourEl.textContent = breadFlourText;
      waterEl.textContent = waterText;
      totalEl.textContent = totalText;
      sentenceEl.textContent = `르방 ${levainText}g에 통밀 ${wholeWheatText}g, 강력분 ${breadFlourText}g, 물 ${waterText}g을 넣어주세요.`;
    }

    levainInput.addEventListener('input', calculate);
    calculate();
  </script>
</body>
</html>
